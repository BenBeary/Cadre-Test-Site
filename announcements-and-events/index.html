<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Announcements &amp; Events - CADRE Alumni</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Figtree:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="preload" as="fetch" href="../json/blog-data.json" crossorigin="anonymous">
    <link rel="stylesheet" href="../css/style.css">
    <script>
        (function () {
            var stored = localStorage.getItem('theme');
            document.documentElement.setAttribute('data-theme', stored || 'dark');
        })();
    </script>
</head>
<body data-page="events" data-root="../">
    <div class="bg-squares bg-squares-left" aria-hidden="true"></div>
    <div class="bg-squares bg-squares-right" aria-hidden="true"></div>

    <div id="site-header"></div>

    <main>
        <section class="news-section" data-blog-section="combined">
            <div class="news-inner">
                <div class="news-header">
                    <h2 class="news-title">Announcements &amp; Events</h2>
                </div>
                <div class="news-controls">
                    <div class="news-search">
                        <input type="search" placeholder="Search by title or date" aria-label="Search announcements and events">
                    </div>
                    <div class="news-filter" role="tablist" aria-label="Filter by type">
                        <button type="button" class="news-filter-btn is-active" data-filter="all" role="tab" aria-selected="true">All</button>
                        <button type="button" class="news-filter-btn" data-filter="announcements" role="tab" aria-selected="false">News</button>
                        <button type="button" class="news-filter-btn" data-filter="events" role="tab" aria-selected="false">Events</button>
                    </div>
                </div>
                <div class="news-grid news-grid-3x3"></div>
                <div class="news-pagination" role="navigation" aria-label="Pagination"></div>
            </div>
        </section>
    </main>

    <div id="site-footer"></div>

    <script src="../js/partials.js"></script>
    <script src="../js/blog-grabber.js"></script>
    <script src="../js/bg-squares.js"></script>
    <script src="../js/main.js"></script>
</body>
</html>
