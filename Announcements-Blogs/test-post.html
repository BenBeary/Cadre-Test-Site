<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title> - CADRE Alumni</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Figtree:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="../css/style.css">
    <link rel="stylesheet" href="../css/blog-style.css">
    <script>
        (function () {
            var stored = localStorage.getItem('theme');
            document.documentElement.setAttribute('data-theme', stored || 'dark');
        })();
    </script>
</head>
<body data-page="events" data-root="../">
    <div class="bg-squares bg-squares-left" aria-hidden="true"></div>
    <div class="bg-squares bg-squares-right" aria-hidden="true"></div>

    <div id="site-header"></div>

    <main>
        <section class="blog-section">
            <div class="blog-inner">
                <header class="blog-header">
                    <h1></h1>
                    <div class="blog-meta">
                        <span class="blog-meta-row"><span class="blog-meta-label">Date:</span><span class="blog-meta-value"></span></span>
                        <span class="blog-meta-row"><span class="blog-meta-label">Written by:</span><span class="blog-meta-value"></span></span>
                    </div>
                </header>

                <div class="blog-layout">
                    <div class="blog-body">
                    <p>Testing Contributer</p>
                    </div>

                <aside class="blog-sidebar">
                    <h2 class="blog-sidebar-title">Contributers:</h2>
                    <div class="contributor-list">
                        <div class="contributor-card">
                            <div class="contributor-photo"><img src="../images/misc/CAO-placeholder.png" alt=""></div>
                            <h3 class="contributor-name"></h3>
                            <div class="contributor-socials">
                                <a href="#" class="social-icon contributor-social" aria-label="Instagram"><svg aria-hidden="true"><use href="../images/misc/social-icons.svg#icon-instagram"/></svg></a>
                                <a href="#" class="social-icon contributor-social" aria-label="Website / Other"><svg aria-hidden="true"><use href="../images/misc/social-icons.svg#icon-link"/></svg></a>
                                <a href="#" class="social-icon contributor-social" aria-label="Bluesky"><svg aria-hidden="true"><use href="../images/misc/social-icons.svg#icon-bluesky"/></svg></a>
                            </div>
                        </div>
                    </div>
                </aside>
                </div>

            </div>
        </section>
    </main>

    <div id="site-footer"></div>

    <script src="../js/partials.js"></script>
    <script src="../js/bg-squares.js"></script>
    <script src="../js/image-modal.js"></script>
    <script src="../js/main.js"></script>
</body>
</html>
